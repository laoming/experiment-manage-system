<link rel="stylesheet" href="/ems/modules/notice-manage/notice-manage.css">

<div class="main-content" v-cloak>
    <!-- 页面标题 -->
    <div class="page-header" v-if="!pageError">
        <h1 class="page-title">公告管理</h1>
        <p class="page-subtitle">发布和管理系统公告</p>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <div class="search-box">
        </div>
        <button class="btn btn-success" @click="openNoticeModal">
            <span>+</span>
            <span>发布公告</span>
        </button>
    </div>

    <!-- 公告列表 -->
    <div class="table-container">
        <div v-if="noticeLoading" class="loading">
            <div class="loading-spinner"></div>
            <p>加载中...</p>
        </div>
        <table v-else class="notice-table">
            <thead>
                <tr>
                    <th>标题</th>
                    <th>内容</th>
                    <th>发布人</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr v-if="noticeList.length === 0">
                    <td colspan="5" class="empty-cell">
                        <div class="empty-content">
                            <div class="empty-icon">📭</div>
                            <p>暂无公告</p>
                        </div>
                    </td>
                </tr>
                <tr v-for="notice in noticeList" :key="notice.id">
                    <td class="text-strong" :title="notice.title">{{ notice.title }}</td>
                    <td class="text-muted" :title="notice.content">{{ notice.content }}</td>
                    <td>{{ notice.creatorName }}</td>
                    <td>{{ formatDateTime(notice.createTime) }}</td>
                    <td class="actions">
                        <button class="action-btn btn-delete" @click="handleDeleteNotice(notice)">
                            <span>🗑️</span>
                            删除
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 发布公告弹窗 -->
    <div class="modal-overlay" v-show="showNoticeModal" style="display: none;" @click.self="closeNoticeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>发布公告</h2>
                <button class="modal-close" @click="closeNoticeModal">✕</button>
            </div>
            <div class="modal-body">
                <form @submit.prevent="handleNoticeSubmit">
                    <div class="form-group">
                        <label class="form-label">公告标题 <span class="required">*</span></label>
                        <input
                            v-model="noticeForm.title"
                            type="text"
                            class="form-input"
                            placeholder="请输入公告标题"
                        >
                    </div>
                    <div class="form-group">
                        <label class="form-label">公告内容 <span class="required">*</span></label>
                        <textarea
                            v-model="noticeForm.content"
                            class="form-textarea"
                            placeholder="请输入公告内容"
                            rows="5"
                        ></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" @click="closeNoticeModal">
                            取消
                        </button>
                        <button type="submit" class="btn btn-primary">
                            发布
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="/ems/modules/notice-manage/notice-manage.js"></script>
